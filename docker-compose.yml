services:
  db:
    image: postgres:15-alpine
    container_name: roulette_db
    restart: always
    environment:
      POSTGRES_USER: rouletteuser
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: roulette_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rouletteuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./infra/Dockerfile.backend
    container_name: roulette_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://rouletteuser:strongpassword@db:5432/roulette_db
      SECRET_KEY: ${SECRET_KEY:-roulette-dev-secret-key}
      DEBUG: ${DEBUG:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0,roulette_frontend,frontend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./infra/Dockerfile.frontend
    container_name: roulette_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
